<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Word analytics</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;800&display=swap"
    rel="stylesheet">

   <link rel="stylesheet" href="style.css">
   <script src="javas2.js" defer></script>
</head>
<body>
   <div class="background"></div>
   <h1 class="first-heading">Word <span class="first-heading--special">analytics</span>
   </h1>
   <h2>jvavaSvript.ir</h2>
   <div class="container">
      <textarea class="textarea" placeholder="Enter Your Text"></textarea>
      <section class="states">
         <section class="state">
            <span class="stat__number stat__number--words">0</span>
            <h2 class="second-heading">words</h2>
         </section>
      <section class="state">
            <span class="stat__number stat__number--Characters">0</span>
            <h2 class="second-heading">Characters</h2>
         </section>
      <section class="state">
            <span class="stat__number stat__number--twitter">280</span>
            <h2 class="second-heading">Twitter</h2>
         </section>
      <section class="state">
            <span class="stat__number stat__number--facebook">2200</span>
            <h2 class="second-heading">Facebook</h2>
         </section>
      </section>
   </div>

   <footer class="footer">
      <small class="copyraight">
         &copy;copyraight by jvavaSvript.ir all rights reserved
      </small>
         <small class="data">
         last checkd limits: 17 dat age
      </small>
   </footer>
</body>
</html>
